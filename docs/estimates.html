<!-- web/estimates.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Saved Estimates</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 600px;
      margin: auto;
      padding: 16px 16px 0 16px;
      padding-top: calc(16px + env(safe-area-inset-top));
      padding-bottom: calc(90px + env(safe-area-inset-bottom));
      min-height: 100%;
    }

    @media screen and (min-width: 600px), screen and (orientation: landscape) {
      html { overflow-y: auto; -webkit-overflow-scrolling: touch; }
      body { overflow-y: visible; }
    }

    /* ── Nav ── */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0 16px 0;
    }
    .nav-title { font-size: 20px; font-weight: 600; color: #fff; }
    .back-link {
      text-decoration: none;
      color: #999;
      font-size: 13px;
      padding: 6px 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
    }
    .back-link:hover { background: #222; color: #fff; }

    /* ── Buttons ── */
    button {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #333;
      background: #222;
      color: #fff;
      transition: background 0.15s;
    }
    button:hover { background: #2a2a2a; }
    button:active { background: #333; }

    .btn-primary {
      background: #fff;
      color: #111;
      border-color: #fff;
    }
    .btn-primary:hover { background: #e8e8e8; }

    .btn-danger { color: #ff6b6b; border-color: #3a1a1a; background: #1e1010; }
    .btn-danger:hover { background: #2a1212; }

    /* ── Estimate cards ── */
    .estimate-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .estimate-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid #222;
    }

    .estimate-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .estimate-date {
      font-size: 12px;
      color: #666;
      margin-top: 3px;
    }

    .estimate-total {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
    }

    .estimate-details {
      margin-bottom: 12px;
    }

    .estimate-item-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 13px;
      color: #888;
    }

    .estimate-subtotals {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #222;
      font-size: 12px;
      color: #666;
    }
    .estimate-subtotals div { padding: 2px 0; }
    .estimate-grand {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-top: 4px;
      padding-top: 4px;
    }

    .button-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ── Empty state ── */
    #emptyMessage {
      text-align: center;
      color: #555;
      padding: 60px 20px;
      font-size: 15px;
    }
    #emptyMessage .empty-icon {
      font-size: 36px;
      display: block;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>
  <div class="nav-bar">
    <span class="nav-title">📑 Saved Estimates</span>
    <a href="index.html" class="back-link">← 🧮 Calculator</a>
  </div>

  <div style="margin-bottom:16px;">
    <button id="clearAllBtn" class="btn-danger">🗑️ Clear all estimates</button>
  </div>

  <div id="estimatesContainer"></div>
  <div id="emptyMessage">
    <span class="empty-icon">📑</span>
    No saved estimates yet
  </div>

  <!-- PDF libs -->
  <script src="vendor/html2canvas.min.js"></script>
  <script src="vendor/jspdf.umd.min.js"></script>
  <script src="capacitor.js"></script>

  <script>
    (function () {
      if (window.jspdf && window.jspdf.jsPDF && !window.jsPDF) window.jsPDF = window.jspdf.jsPDF;
      if (window.jspdf && window.jspdf.default && !window.jsPDF) window.jsPDF = window.jspdf.default;
    })();
  </script>

  <script src="estimates.js"></script>
</body>
</html>
